provider:
  name: aws
env:
  - name: AWS_SHARED_CREDENTIALS_FILE
    value: /.aws/credentials/credentials # File named credentials
  - name: AWS_DEFAULT_REGION
    value: us-west-2
extraVolumes:
  - name: aws-credentials
    secret:
      secretName: external-dns
extraVolumeMounts:
  - name: aws-credentials
    mountPath: /.aws/credentials
    readOnly: true
# Note all CRDs must be listed here, otherwise external-dns won't know to watch them and won't update DNS records when they change
# See https://kubernetes-sigs.github.io/external-dns/latest/docs/sources/gateway-api/ for supported API versions
sources:
  - service
  - gateway-httproute
  - gateway-tlsroute
