---
# This is the default gateway for the cluster. It is used to route traffic to a variety of services that can be co-located behind the same load balancer.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: default-gateway
  namespace: gateway # custom namespace for gateways
  annotations:
    cert-manager.io/cluster-issuer: cloudflare
spec:
  gatewayClassName: cilium
  listeners:
    # HTTP redirect to HTTPS
    - protocol: HTTP
      port: 80
      name: https-redirect
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
    # Media services
    - protocol: HTTPS
      port: 443
      name: media
      hostname: "*.media.jmaz.tv"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: wildcard-media-jmaz-tv-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: media
    # UHD Media services
    - protocol: HTTPS
      port: 443
      name: media-uhd
      hostname: "*.uhd.media.jmaz.tv"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: wildcard-media-jmaz-tv-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: media
    # # unifi.local.julianmaze.com
    # - protocol: TLS
    #   port: 443
    #   name: unifi
    #   hostname: "unifi.local.julianmaze.com"
    #   tls:
    #     mode: Passthrough # TLS is handled by the unifi application
    #     # mode: Terminate # Terminate TLS at the gateway
    #     # certificateRefs:
    #     #   - name: wildcard-local-julianmaze-com-tls
    #   allowedRoutes:
    #     namespaces:
    #       from: Selector
    #       selector:
    #         matchExpressions:
    #           - key: kubernetes.io/metadata.name
    #             operator: In
    #             values:
    #               - unifi
    # local.julianmaze.com
    - protocol: HTTPS
      port: 443
      name: local-subdomain
      hostname: "*.local.julianmaze.com"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: wildcard-local-julianmaze-com-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - longhorn-system
                  - development
                  - unifi
                  - kube-system
                  - observability
    # home assistant public
    - protocol: HTTPS
      port: 443
      name: home-assistant-public
      hostname: "home.julianmaze.com"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: home-julianmaze-com-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            # There should be multiple here
            matchLabels:
              kubernetes.io/metadata.name: external-services
    # scrypted home public
    - protocol: HTTPS
      port: 443
      name: scrypted-home-public
      hostname: "scrypted-home.julianmaze.com"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: scrypted-home-julianmaze-com-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            # There should be multiple here
            matchLabels:
              kubernetes.io/metadata.name: external-services
    # storage.jmaz.tv
    - protocol: HTTPS
      port: 443
      name: storage-jmaz-tv
      hostname: "storage.jmaz.tv"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: storage-jmaz-tv-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            # There should be multiple here
            matchLabels:
              kubernetes.io/metadata.name: external-services
    # photos.jmaz.tv
    - protocol: HTTPS
      port: 443
      name: photos-jmaz-tv
      hostname: "photos.jmaz.tv"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: photos-jmaz-tv-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            # There should be multiple here
            matchLabels:
              kubernetes.io/metadata.name: external-services
    # surfcam.julianmaze.com
    - protocol: HTTPS
      port: 443
      name: surfcam-redirect
      hostname: "surfcam.julianmaze.com"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: surfcam-julianmaze-com-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Same
    # overseerr.jmaz.tv
    - protocol: HTTPS
      port: 443
      name: overseerr
      hostname: "overseerr.jmaz.tv"
      tls:
        mode: Terminate # Terminate TLS at the gateway
        certificateRefs:
          - name: overseerr-jmaz-tv-tls
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
            group: gateway.networking.k8s.io
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: media
